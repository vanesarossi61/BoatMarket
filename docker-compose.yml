version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: boatmarket-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: boatmarket
      POSTGRES_PASSWORD: boatmarket
      POSTGRES_DB: boatmarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boatmarket']
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch - Full-text search engine
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: boatmarket-search
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: boatmarket-dev-master-key
      MEILI_ENV: development
      MEILI_LOG_LEVEL: INFO
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache, sessions, rate limiting
  redis:
    image: redis:7-alpine
    container_name: boatmarket-cache
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  meilisearch_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: boatmarket-network
